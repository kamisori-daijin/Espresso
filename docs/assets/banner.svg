<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <style>
    :root {
      --bg-color: white;
      --text-color: black;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg-color: #0d1117;
        --text-color: white;
      }
    }
    .background { fill: var(--bg-color); }
    .title { fill: var(--text-color); }
  </style>
  <rect class="background" width="100%" height="100%"/>
  <text class="title" x="50%" y="50%" dominant-baseline="middle" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="80" font-weight="bold">
    Espresso
  </text>
</svg>
